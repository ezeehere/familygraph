<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FamilyGraph | Path Finder</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app-frame">
    <header class="top-bar">
      <a class="brand-name" href="index.html">FamilyGraph</a>

      <nav class="nav-links">
        <a href="tree.html?id=aarav">Tree</a>
        <a href="people.html">People</a>
        <a href="path.html">Path</a>
      </nav>
    </header>

    <section class="path-screen">
      <p class="page-label">Relationship Path Finder</p>

      <div class="path-panel">
        <div class="path-select-box">
          <label for="startPerson">From</label>
          <select id="startPerson"></select>
        </div>

        <button id="swapPeopleBtn" class="swap-btn" type="button">Swap</button>

        <div class="path-select-box">
          <label for="endPerson">To</label>
          <select id="endPerson"></select>
        </div>

        <button id="findPathBtn" class="find-path-btn" type="button">
          Find Path
        </button>
      </div>

      <div id="pathResult" class="path-result-box"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
 <script src="js/utils.js?v=auth-token-1"></script>
  <script src="js/path.js"></script>
</body>
</html>
